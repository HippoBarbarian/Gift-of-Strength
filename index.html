<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift of Strength - Family Fitness</title>
    <!-- Tailwind CSS for modern utility styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel CDN to compile JSX in the browser in real-time -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        /* Custom scrollbar styling for simulated logs */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #fef3c7;
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb {
            background: #f59e0b;
            border-radius: 8px;
        }
        /* Fade-in transition animations */
        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-amber-50">

    <!-- The DOM element where our React app will mount -->
    <div id="root"></div>

    <script type="text/babel">
        // Custom SVG icons to eliminate third-party bundle dependency bugs
        const IconFlame = () => (
            <svg className="w-5 h-5 text-amber-500 fill-amber-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path fillRule="evenodd" d="M12.963 2.285a.75.75 0 0 1 .166.75 8.25 8.25 0 0 0 10.518 9.53a.75.75 0 0 1 .945.945A10.003 10.003 0 0 1 12 21.75c-5.523 0-10-4.477-10-10a9.96 9.96 0 0 1 8.012-9.719.75.75 0 0 1 .951.254l.001.001ZM12 4.5A7.5 7.5 0 0 0 4.5 12a7.5 7.5 0 0 0 7.5 7.5 7.5 7.5 0 0 0 7.5-7.5c0-.462-.042-.914-.122-1.353A10.002 10.002 0 0 1 12 4.5Z" clipRule="evenodd" />
            </svg>
        );

        const IconHeart = () => (
            <svg className="w-6 h-6 fill-rose-500 text-rose-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2.5} stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" />
            </svg>
        );

        const IconBell = () => (
            <svg className="w-5 h-5 text-amber-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
            </svg>
        );

        const IconVolume = () => (
            <svg className="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.75 8.25l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.009 9.009 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z" />
            </svg>
        );

        const IconArrowLeft = () => (
            <svg className="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2.5} stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
            </svg>
        );

        // Movement Exercise Icons
        const PushUpIcon = () => (
            <svg className="w-12 h-12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M18 15l-6-6-6 6" />
                <rect x="2" y="18" width="20" height="2" rx="1" fill="currentColor" />
                <path d="M12 2v6" />
            </svg>
        );

        const SquatIcon = () => (
            <svg className="w-12 h-12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M6 3h12a1 1 0 0 1 1 1v2a4 4 0 0 1-4 4H9a4 4 0 0 1-4-4V4a1 1 0 0 1 1-1z" />
                <path d="M8 10v10M16 10v10" />
            </svg>
        );

        const SitUpIcon = () => (
            <svg className="w-12 h-12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M4 19a4 4 0 0 1 4-4h8a4 4 0 0 1 4 4" />
                <circle cx="12" cy="7" r="4" />
            </svg>
        );

        const LungeIcon = () => (
            <svg className="w-12 h-12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M13 4l-4 4 4 4" />
                <path d="M5 20h14" />
                <path d="M9 8h6M12 8v10" />
            </svg>
        );

        const INITIAL_PROFILES = [
          {
            id: 'derek',
            name: 'Derek (Dad)',
            role: 'Parent',
            avatar: '🐯',
            petName: 'Tango the Tiger',
            bgColor: 'from-orange-400 to-amber-500',
            borderColor: 'border-orange-400',
            exercise: 'Push Ups',
            targetReps: 20,
            repsDone: 0,
            completed: false,
            streak: 5,
            lastCompleted: null
          },
          {
            id: 'alex',
            name: 'Alex (Son)',
            role: 'Kid',
            avatar: '🐻',
            petName: 'Barnaby the Bear',
            bgColor: 'from-blue-400 to-cyan-500',
            borderColor: 'border-blue-400',
            exercise: 'Push Ups',
            targetReps: 10,
            repsDone: 0,
            completed: false,
            streak: 3,
            lastCompleted: null
          },
          {
            id: 'bridget',
            name: 'Bridget (Mom)',
            role: 'Parent',
            avatar: '🐼',
            petName: 'Penny the Panda',
            bgColor: 'from-purple-400 to-pink-500',
            borderColor: 'border-purple-400',
            exercise: 'Push Ups',
            targetReps: 15,
            repsDone: 0,
            completed: false,
            streak: 12,
            lastCompleted: null
          }
        ];

        const CHIBI_NUDGES = [
          "🦁 rawrs: Let's knock out those exercises!",
          "🐼 munches: A little power fitness makes a big smile!",
          "🐯 pounces: Don't let our family streak break!",
          "🐻 waves: High five! You can do your workout!",
          "🐰 hops: Quick, fitness time! Our family bond is counting on you!"
        ];

        function App() {
          const [profiles, setProfiles] = React.useState(() => {
            const saved = localStorage.getItem('gift_of_strength_profiles');
            return saved ? JSON.parse(saved) : INITIAL_PROFILES;
          });
          
          const [activeProfileId, setActiveProfileId] = React.useState('alex');
          const [isLoggedIn, setIsLoggedIn] = React.useState(false);
          const [usernameInput, setUsernameInput] = React.useState("");
          const [passwordInput, setPasswordInput] = React.useState("");
          const [loginError, setLoginError] = React.useState("");
          
          // Navigation State: 'home', 'select_exercise', 'log', 'challenge', 'nudge', 'friends'
          const [currentView, setCurrentView] = React.useState('home');
          const [selectedExercise, setSelectedExercise] = React.useState('Push Ups');

          const [notifications, setNotifications] = React.useState([
            { id: 1, text: "🐯 Derek completed his daily Push Ups!", time: "1 hour ago", read: false }
          ]);
          const [familyStreak, setFamilyStreak] = React.useState(() => {
            const saved = localStorage.getItem('gift_of_strength_family_streak');
            return saved ? parseInt(saved, 10) : 4;
          });
          const [celebration, setCelebration] = React.useState(null);
          const [activeNudgeUser, setActiveNudgeUser] = React.useState(null);
          const [customNudgeMessage, setCustomNudgeMessage] = React.useState("");
          const [soundEnabled, setSoundEnabled] = React.useState(true);

          // Interactive logging temporary rep counters
          const [repCounter, setRepCounter] = React.useState(0);

          const [friendSearchQuery, setFriendSearchQuery] = React.useState("");
          const [friendsList, setFriendsList] = React.useState([
            { id: 'derek', name: 'Derek (Dad)', avatar: '🐯', role: 'Parent', status: 'Online', streak: 5, completed: false },
            { id: 'bridget', name: 'Bridget (Mom)', avatar: '🐼', role: 'Parent', status: 'Online', streak: 12, completed: true },
            { id: 'grandma', name: 'Grandma Jo', avatar: '🐨', role: 'Grandmother', status: 'Active', streak: 21, completed: true },
            { id: 'uncle_bob', name: 'Uncle Bob', avatar: '🦁', role: 'Uncle', status: 'Resting', streak: 8, completed: false }
          ]);
          
          const [globalUsersPool, setGlobalUsersPool] = React.useState([
            { id: 'coach_dan', name: 'Coach Dan', avatar: '🦊', role: 'Trainer', status: 'Online', streak: 15, completed: true },
            { id: 'cousin_jenny', name: 'Cousin Jenny', avatar: '🐰', role: 'Cousin', status: 'Online', streak: 2, completed: false },
            { id: 'bestie_leo', name: 'Leo (Best Friend)', avatar: '🐸', role: 'Friend', status: 'Online', streak: 4, completed: false },
            { id: 'aunt_sarah', name: 'Aunt Sarah', avatar: '🦄', role: 'Aunt', status: 'Offline', streak: 9, completed: true }
          ]);

          const addFriend = (newFriend) => {
            setFriendsList(prev => [...prev, newFriend]);
            setGlobalUsersPool(prev => prev.filter(u => u.id !== newFriend.id));
            playSound('complete');
            
            const systemNotif = {
              id: Date.now(),
              text: `🤝 You are now friends with ${newFriend.name}!`,
              time: "Just now",
              read: false,
              special: true
            };
            setNotifications(prev => [systemNotif, ...prev]);
          };

          // Save to local storage whenever state changes
          React.useEffect(() => {
            localStorage.setItem('gift_of_strength_profiles', JSON.stringify(profiles));
          }, [profiles]);

          React.useEffect(() => {
            localStorage.setItem('gift_of_strength_family_streak', familyStreak.toString());
          }, [familyStreak]);

          const currentProfile = profiles.find(p => p.id === activeProfileId) || profiles[0];

          // Synthesis Sound Engine
          const playSound = (type) => {
            if (!soundEnabled) return;
            try {
              const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
              const oscillator = audioCtx.createOscillator();
              const gainNode = audioCtx.createGain();
              
              oscillator.connect(gainNode);
              gainNode.connect(audioCtx.destination);

              if (type === 'complete') {
                oscillator.type = 'triangle';
                oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.15); // E5
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.3);
              } else if (type === 'nudge') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(440, audioCtx.currentTime); // A4
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime + 0.1); // A5
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.2);
              } else if (type === 'switch' || type === 'rep') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(type === 'rep' ? 350 + (repCounter * 20) : 300, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.08);
              }
            } catch (e) {
              console.warn("Audio Context setup delayed.");
            }
          };

          const handleLogin = (e) => {
            e.preventDefault();
            if (!usernameInput.trim()) {
              setLoginError("Please enter a username!");
              return;
            }

            const cleanUser = usernameInput.trim().toLowerCase();
            let targetProfile = profiles.find(p => p.id === cleanUser || p.name.toLowerCase().includes(cleanUser));

            if (!targetProfile) {
              const availableAnimals = [
                { avatar: "🦁", petName: "Leo the Lion", bgColor: "from-yellow-400 to-orange-500", border: "border-yellow-400" },
                { avatar: "🦊", petName: "Finny the Fox", bgColor: "from-orange-500 to-red-500", border: "border-orange-500" },
                { avatar: "🐸", petName: "Hopper the Frog", bgColor: "from-emerald-400 to-green-500", border: "border-emerald-400" }
              ];
              const randomAsset = availableAnimals[Math.floor(Math.random() * availableAnimals.length)];
              
              const newProfile = {
                id: cleanUser.replace(/\s+/g, ''),
                name: `${usernameInput.trim()} (Guest)`,
                role: 'Adventurer',
                avatar: randomAsset.avatar,
                petName: randomAsset.petName,
                bgColor: randomAsset.bgColor,
                borderColor: randomAsset.border,
                exercise: 'Push Ups',
                targetReps: 12,
                repsDone: 0,
                completed: false,
                streak: 1,
                lastCompleted: null
              };

              setProfiles(prev => [...prev, newProfile]);
              setActiveProfileId(newProfile.id);
            } else {
              setActiveProfileId(targetProfile.id);
            }

            playSound('complete');
            setIsLoggedIn(true);
            setCurrentView('home');
            setLoginError("");
          };

          const handleProfileChange = (id) => {
            setActiveProfileId(id);
            const tgt = profiles.find(p => p.id === id);
            setRepCounter(tgt ? tgt.repsDone : 0);
            playSound('switch');
          };

          const selectExerciseAndProceed = (exerciseName) => {
            setSelectedExercise(exerciseName);
            // Dynamically assign target reps based on selected exercise
            let multiplier = 1;
            if (exerciseName === 'Squats') multiplier = 1.2; // kids and parents can do a bit more squats
            if (exerciseName === 'Sit Ups') multiplier = 1;
            if (exerciseName === 'Lunges') multiplier = 0.8; // lunges are slightly harder

            setProfiles(prev => prev.map(p => {
              if (p.id === activeProfileId) {
                return {
                  ...p,
                  exercise: exerciseName,
                  targetReps: Math.round((p.id === 'alex' ? 10 : p.id === 'derek' ? 20 : 15) * multiplier)
                };
              }
              return p;
            }));

            setRepCounter(0);
            playSound('switch');
            setCurrentView('log');
          };

          const incrementRep = () => {
            if (currentProfile.completed) return;
            const newRepCount = repCounter + 1;
            setRepCounter(newRepCount);
            playSound('rep');

            setProfiles(prev => prev.map(p => p.id === activeProfileId ? { ...p, repsDone: newRepCount } : p));

            if (newRepCount >= currentProfile.targetReps) {
              completeWorkout();
            }
          };

          const completeWorkout = () => {
            setProfiles(prevProfiles => 
              prevProfiles.map(p => {
                if (p.id === activeProfileId) {
                  if (p.completed) return p;
                  return {
                    ...p,
                    completed: true,
                    repsDone: p.targetReps,
                    streak: p.streak + 1,
                    lastCompleted: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                  };
                }
                return p;
              })
            );

            setCelebration(currentProfile);
            playSound('complete');

            const newNotif = {
              id: Date.now(),
              text: `${currentProfile.avatar} ${currentProfile.name} completed their daily ${selectedExercise}!`,
              time: "Just now",
              read: false
            };
            setNotifications(prev => [newNotif, ...prev]);

            setTimeout(() => {
              setProfiles(latestProfiles => {
                const allDone = latestProfiles.every(p => p.completed || p.id === activeProfileId ? true : p.completed);
                if (allDone) {
                  setFamilyStreak(s => s + 1);
                  const streakNotif = {
                    id: Date.now() + 1,
                    text: `🎉 Incredible! Everyone did their exercises today! Family Bond upgraded to a ${familyStreak + 1} day streak! ❤️`,
                    time: "Just now",
                    read: false,
                    special: true
                  };
                  setNotifications(prev => [streakNotif, ...prev]);
                }
                return latestProfiles;
              });
            }, 100);
          };

          const triggerNudge = (targetProfile, messageText) => {
            const message = messageText || `Remember to do your ${targetProfile.targetReps} ${targetProfile.exercise}!`;
            
            const nudgeNotif = {
              id: Date.now(),
              text: `${currentProfile.avatar} ${currentProfile.name} sent a reminder to ${targetProfile.avatar} ${targetProfile.name}: "${message}"`,
              time: "Just now",
              read: false,
              nudge: true
            };

            setNotifications(prev => [nudgeNotif, ...prev]);
            playSound('nudge');
            setActiveNudgeUser(null);
            setCustomNudgeMessage("");
          };

          const resetDay = () => {
            setProfiles(prev => prev.map(p => ({ ...p, completed: false, repsDone: 0 })));
            setRepCounter(0);
            const systemNotif = {
              id: Date.now(),
              text: "🌅 A new day has dawned! Exercises have been reset. Get ready to build that strength!",
              time: "Just now",
              read: false,
              special: true
            };
            setNotifications(prev => [systemNotif, ...prev]);
          };

          // Render Login Screen if unauthenticated
          if (!isLoggedIn) {
            return (
              <div className="min-h-screen bg-slate-950 flex flex-col justify-between p-4 relative overflow-hidden text-slate-100 font-sans">
                <div className="absolute top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-amber-500/10 rounded-full blur-[120px] pointer-events-none"></div>
                
                <div className="flex-1 flex flex-col items-center justify-center">
                  <div className="w-full max-w-md bg-slate-900/50 border border-slate-800/80 backdrop-blur-2xl rounded-3xl p-8 shadow-2xl relative fade-in">
                    
                    <div className="text-center mb-8">
                      <div className="inline-flex bg-gradient-to-tr from-amber-400 to-orange-500 p-4 rounded-2xl shadow-lg mb-4 text-3xl">
                        🎁
                      </div>
                      <h1 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-400 via-orange-400 to-rose-400 tracking-tight">
                        Gift of Strength
                      </h1>
                      <p className="text-slate-400 text-sm mt-1.5 font-medium">Family Exercise Accountability</p>
                    </div>

                    <form onSubmit={handleLogin} className="space-y-5">
                      <div>
                        <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Username</label>
                        <input 
                          type="text" 
                          placeholder="Type 'Alex', 'Bridget', 'Derek' or your own"
                          className="w-full bg-slate-950/80 border border-slate-800 text-white rounded-xl px-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 placeholder-slate-600 text-sm transition-all"
                          value={usernameInput}
                          onChange={(e) => setUsernameInput(e.target.value)}
                        />
                        <p className="text-[11px] text-slate-500 mt-1.5">💡 Tip: Use a family name to load custom character streaks!</p>
                      </div>

                      <div>
                        <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Password</label>
                        <input 
                          type="password" 
                          placeholder="••••••••"
                          className="w-full bg-slate-950/80 border border-slate-800 text-white rounded-xl px-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 placeholder-slate-600 text-sm transition-all"
                          value={passwordInput}
                        />
                      </div>

                      {loginError && (
                        <p className="text-xs text-rose-400 font-medium text-center">{loginError}</p>
                      )}

                      <button 
                        type="submit"
                        className="w-full bg-gradient-to-r from-amber-400 to-orange-500 hover:from-amber-500 hover:to-orange-600 text-slate-950 font-black text-sm tracking-wider uppercase py-4 rounded-xl shadow-lg active:scale-95 transition-all cursor-pointer"
                      >
                        Log In
                      </button>
                    </form>
                  </div>
                </div>

                <footer className="text-center text-xs text-slate-600 relative z-10 py-2">
                  Gift of Strength © 2026 • Consistency over comparison.
                </footer>
              </div>
            );
          }

          // Main Interactive Layout after logging in
          return (
            <div className="min-h-screen bg-amber-50 text-slate-800 font-sans pb-12 transition-all fade-in">
              {celebration && (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                  <div className="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl border-4 border-emerald-400 relative overflow-hidden transform scale-100 transition-transform">
                    <div className="absolute -right-8 -top-8 w-24 h-24 bg-yellow-300 rounded-full opacity-50 blur-xl"></div>
                    <div className="text-7xl mb-4 animate-bounce">{celebration.avatar}</div>
                    <h3 className="text-2xl font-black text-emerald-600 mb-2">UTTERLY AWESOME!</h3>
                    <p className="text-slate-600 font-medium mb-4">
                      {celebration.petName} is doing backflips! You completed all <span className="font-bold text-slate-800">{celebration.targetReps} {selectedExercise}</span>.
                    </p>
                    <div className="bg-amber-100 rounded-full px-4 py-2 inline-flex items-center gap-1.5 mb-6 text-amber-700 font-bold">
                      <IconFlame />
                      <span>Your Streak: {celebration.streak} Days!</span>
                    </div>
                    <button 
                      onClick={() => { setCelebration(null); setCurrentView('home'); }}
                      className="w-full bg-emerald-500 hover:bg-emerald-600 active:scale-95 text-white font-bold py-3 px-6 rounded-2xl shadow-lg transition-all text-lg"
                    >
                      Return to Dashboard 🚀
                    </button>
                  </div>
                </div>
              )}

              {/* Dynamic App Header */}
              <header className="bg-white border-b-4 border-amber-200 sticky top-0 z-30">
                <div className="max-w-4xl mx-auto px-4 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center gap-3">
                    <div className="bg-amber-400 p-2.5 rounded-2xl shadow-inner text-2xl cursor-pointer" onClick={() => setCurrentView('home')}>🎁</div>
                    <div>
                      <h1 className="text-2xl font-black text-amber-600 tracking-tight leading-none">
                        Gift of Strength
                      </h1>
                      <p className="text-xs text-slate-500 mt-1">
                        Welcome back, <span className="font-bold text-slate-700">{currentProfile.name.split(' ')[0]}</span>! You've got this, Champ!
                      </p>
                    </div>
                  </div>

                          <button 
                            onClick={() => triggerNudge(activeNudgeUser, customNudgeMessage)}
                            className="flex-1 bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600 text-white py-2.5 rounded-xl font-bold transition-all text-sm"
                          >
                            Send Nudge Now
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {/* 5. SUB-VIEW: FRIENDS LIST (Streaks Connection Deck) */}
                {currentView === 'friends' && (
                  <div className="fade-in space-y-6">
                    <button 
                      onClick={() => {
                        setCurrentView('home');
                        setFriendSearchQuery("");
                      }} 
                      className="flex items-center gap-2 text-sm font-bold text-slate-500 hover:text-slate-800 transition-all bg-white py-2 px-4 rounded-xl border border-slate-200 w-fit"
                    >
                      <IconArrowLeft /> Back to Dashboard
                    </button>

                    <div className="bg-white rounded-3xl p-6 border-2 border-slate-100 shadow-lg space-y-6">
                      <div className="flex justify-between items-center pb-4 border-b border-slate-100">
                        <div>
                          <h2 className="text-2xl font-black text-slate-800">Community & Friends</h2>
                          <p className="text-xs text-slate-500">Add friends, view completion statuses, and stay connected!</p>
                        </div>
                        <span className="text-4xl">❤️</span>
                      </div>

                      {/* Top Section: Search Bar & Interactive Search Results */}
                      <div className="space-y-3">
                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider">Add New Friends</label>
                        <div className="relative">
                          <input 
                            type="text" 
                            placeholder="Search for another user..."
                            value={friendSearchQuery}
                            onChange={(e) => setFriendSearchQuery(e.target.value)}
                            className="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl pl-4 pr-10 py-3 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:bg-white text-sm transition-all"
                          />
                          <span className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400">🔍</span>
                        </div>

                        {/* Interactive Search Results */}
                        {friendSearchQuery.trim() !== "" && (
                          <div className="bg-slate-50 border border-slate-200 rounded-2xl p-4 space-y-3 mt-2">
                            <h4 className="text-xs font-bold text-slate-400 uppercase tracking-widest">Search Results</h4>
                            {globalUsersPool.filter(user => 
                              user.name.toLowerCase().includes(friendSearchQuery.toLowerCase())
                            ).length === 0 ? (
                              <p className="text-xs text-slate-500 italic">No users found matching "{friendSearchQuery}". Try searching "Coach", "Jenny", or "Sarah"!</p>
                            ) : (
                              <div className="space-y-2">
                                {globalUsersPool
                                  .filter(user => user.name.toLowerCase().includes(friendSearchQuery.toLowerCase()))
                                  .map(user => (
                                    <div key={user.id} className="flex items-center justify-between p-2 bg-white rounded-xl border border-slate-100">
                                      <div className="flex items-center gap-3">
                                        <span className="text-2xl bg-slate-100 p-1 rounded-lg">{user.avatar}</span>
                                        <div>
                                          <h5 className="text-xs font-bold text-slate-700">{user.name}</h5>
                                          <p className="text-[10px] text-slate-400">{user.role} • Streak: {user.streak}🔥</p>
                                        </div>
                                      </div>
                                      <button 
                                        onClick={() => addFriend(user)}
                                        className="bg-amber-400 hover:bg-amber-500 active:scale-95 text-slate-900 font-extrabold text-xs py-1.5 px-3 rounded-xl transition-all shadow-sm"
                                      >
                                        + Add Friend
                                      </button>
                                    </div>
                                  ))
                                }
                              </div>
                            )}
                          </div>
                        )}
                      </div>

                      {/* Main Section: Clean, scrollable Friends List */}
                      <div className="space-y-3">
                        <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest">My Friends List</h3>
                        <div className="space-y-3 max-h-[350px] overflow-y-auto pr-1">
                          {friendsList.map(p => (
                            <div key={p.id} className="p-4 bg-slate-50 border border-slate-100 rounded-2xl flex items-center justify-between hover:bg-slate-100/50 transition-all">
                              <div className="flex items-center gap-3">
                                <span className="text-4xl bg-white p-2 rounded-xl shadow-xs border border-slate-100">{p.avatar}</span>
                                <div>
                                  <h4 className="font-extrabold text-slate-700">{p.name}</h4>
                                  <span className="text-xs bg-slate-200/60 text-slate-600 py-0.5 px-2 rounded-md font-bold uppercase tracking-wider">{p.role}</span>
                                </div>
                              </div>

                              <div className="flex flex-col items-end gap-1.5">
                                {/* Small status indicator */}
                                <div className="flex items-center gap-1.5">
                                  <span className={`w-2.5 h-2.5 rounded-full ${
                                    p.completed ? 'bg-emerald-500 animate-pulse' : 
                                    p.status === 'Online' ? 'bg-blue-500 animate-pulse' : 'bg-slate-400'
                                  }`}></span>
                                  <span className="text-[11px] font-bold text-slate-500">
                                    {p.completed ? 'Completed today! 🎉' : p.status}
                                  </span>
                                </div>

                                <div className="flex items-center gap-1 bg-amber-100/80 text-amber-800 font-extrabold px-2 py-0.5 rounded-lg text-xs">
                                  <IconFlame />
                                  <span>{p.streak} Days active</span>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  </div>
                )}

              </main>
            </div>
          );
        }

        // Render the app in the DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
