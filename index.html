            border-radius: 8px;
        }

        }

        // Helper Map to dynamically render the correct high fidelity Lion Guard SVG based on ID
        const RenderAnimal = ({ id, className = "w-12 h-12" }) => {

        const INITIAL_PROFILES = [
          {
            id: 'camy',
            name: 'Camy',
            avatar: '🦁', // keeping character references matching requested schema
            petName: 'Camy the Lion',
            bgColor: 'from-amber-500 to-orange-600',
            borderColor: 'border-amber-500',
            exercise: 'Push Ups',
            targetReps: 20,
            repsDone: 0,
            completed: false,

            lastCompleted: null

          {
            id: 'scoot',
            name: 'Scoot',
            avatar: '❄️',
            petName: 'Scoot the Snow Leopard',
            bgColor: 'from-blue-400 to-cyan-500',
            borderColor: 'border-blue-400',
            exercise: 'Push Ups',
            targetReps: 10,
            repsDone: 0,
            completed: false,
            streak: 3,
            lastCompleted: null
          },
          {
            id: 'cali',
            name: 'Cali',
            avatar: '🐆',
            petName: 'Cali the Cheetah',
            bgColor: 'from-purple-400 to-pink-500',
            borderColor: 'border-purple-400',
            exercise: 'Push Ups',
            targetReps: 15,
            repsDone: 0,
            completed: false,
            streak: 12,
            lastCompleted: null
          }
        ];

        // Custom dynamic alerts using the active characters requested
        const CHIBI_NUDGES = [
          "🦁 Camy roars: Unleash your pride's power! Let's get moving!",
          "🐆 Cali dashes: Speed past your goals today! You've got this!",
          "❄️ Scoot leaps: Jump into action! Let's keep our streak burning!",
          "🦛 Fritz splashes: Make a huge impact today! Push ups time!",
          "🦓 Bahaty strides: Stand tall and proud! Do your exercise!",
          "🫏 Jeffery charges: Keep going strong, no stopping us!",
          "🐗 Moci snout-pokes: A little effort goes a long way!",
          "🐼 Hua Hua climbs: High up to victory! Do your reps!",
          "🐂 Kimbunga charges: Face the challenge head on!"
        ];

        function App() {
          const [profiles, setProfiles] = React.useState(() => {
            const saved = localStorage.getItem('gift_of_strength_profiles');
            return saved ? JSON.parse(saved) : INITIAL_PROFILES;
          });
          
          const [activeProfileId, setActiveProfileId] = React.useState('scoot'); // Start focused on Scoot
          const [isLoggedIn, setIsLoggedIn] = React.useState(false);
          const [usernameInput, setUsernameInput] = React.useState("");
          const [passwordInput, setPasswordInput] = React.useState("");
          const [loginError, setLoginError] = React.useState("");
          
          // Navigation State: 'home', 'log', 'challenge', 'nudge', 'friends'
          const [currentView, setCurrentView] = React.useState('home');

          const [notifications, setNotifications] = React.useState([
            { id: 1, text: "🦁 Camy completed his daily 20 Strong Push Ups!", time: "1 hour ago", read: false }
          ]);
          const [familyStreak, setFamilyStreak] = React.useState(() => {
            const saved = localStorage.getItem('gift_of_strength_family_streak');
            return saved ? parseInt(saved, 10) : 4;
          });
          const [celebration, setCelebration] = React.useState(null);
          const [activeNudgeUser, setActiveNudgeUser] = React.useState(null);
          const [customNudgeMessage, setCustomNudgeMessage] = React.useState("");
          const [soundEnabled, setSoundEnabled] = React.useState(true);

          // Interactive logging temporary rep counters
          const [repCounter, setRepCounter] = React.useState(0);

          // Full community friends pool featuring the new names
          const [friendsList, setFriendsList] = React.useState([
            { id: 'camy', name: 'Camy', title: 'Lion', status: 'Online', streak: 5, completed: false },
            { id: 'cali', name: 'Cali', title: 'Cheetah', status: 'Online', streak: 12, completed: true },
            { id: 'scoot', name: 'Scoot', title: 'Snow Leopard', status: 'Active', streak: 3, completed: false },
            { id: 'fritz', name: 'Fritz', title: 'Hippo', status: 'Online', streak: 8, completed: true },
            { id: 'bahaty', name: 'Bahaty', title: 'Okapi', status: 'Active', streak: 21, completed: true }
          ]);

          const [globalUsersPool, setGlobalUsersPool] = React.useState([
            { id: 'jeffery', name: 'Jeffery', title: 'Onager', status: 'Online', streak: 2, completed: false },
            { id: 'moci', name: 'Moci', title: 'Tapir', status: 'Online', streak: 4, completed: false },
            { id: 'huahua', name: 'Hua Hua', title: 'Panda', status: 'Active', streak: 11, completed: true },
            { id: 'kimbunga', name: 'Kimbunga', title: 'Ankoli Cow', status: 'Offline', streak: 9, completed: true }
          ]);

          const [friendSearchQuery, setFriendSearchQuery] = React.useState("");

          // Save to local storage whenever state changes
          React.useEffect(() => {
            localStorage.setItem('gift_of_strength_profiles', JSON.stringify(profiles));
          }, [profiles]);

          React.useEffect(() => {
            localStorage.setItem('gift_of_strength_family_streak', familyStreak.toString());
          }, [familyStreak]);

          const currentProfile = profiles.find(p => p.id === activeProfileId) || profiles[0];

          // Synthesis Sound Engine
          const playSound = (type) => {
            if (!soundEnabled) return;
            try {
              const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
              const oscillator = audioCtx.createOscillator();
              const gainNode = audioCtx.createGain();
              
              oscillator.connect(gainNode);
              gainNode.connect(audioCtx.destination);

              if (type === 'complete') {
                oscillator.type = 'triangle';
                oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.15); // E5
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.3);
              } else if (type === 'nudge') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(440, audioCtx.currentTime); // A4
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime + 0.1); // A5
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.2);
              } else if (type === 'switch' || type === 'rep') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(type === 'rep' ? 350 + (repCounter * 20) : 300, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);

                oscillator.stop(audioCtx.currentTime + 0.08);

                      >
                        <div className="absolute right-4 top-4 text-pink-100/30 group-hover:scale-110 transition-transform">
                          <svg className="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"></path></svg>
                        </div>
                        <span className="bg-white/20 p-2 rounded-2xl w-fit text-xl">❤️</span>
                        <div>
                          <h3 className="text-xl font-extrabold tracking-tight">Friends</h3>
                          <p className="text-xs text-pink-100 mt-1 font-medium">Compare streaks & view connections!</p>
                        </div>
                      </button>

                    </div>

                    {/* Quick Simulated Live Alert Feed */}
                    <div className="bg-white rounded-3xl p-5 border-2 border-slate-100 shadow-sm">
                      <h4 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Live Feed Alerts</h4>
                      <div className="space-y-2">
                        {notifications.slice(0, 2).map((n, i) => (
                          <div key={i} className="text-xs text-slate-600 bg-slate-50 p-2.5 rounded-xl border border-slate-100 flex items-center justify-between">
                            <span>{n.text}</span>
                            <span className="text-[10px] text-slate-400">{n.time}</span>
                          </div>
                        ))}
                      </div>
                    </div>

                  </div>
                )}

                {/* 2. SUB-VIEW: LOG EXERCISE (Interactive Push Up Counter) */}
                {currentView === 'log' && (
                  <div className="fade-in space-y-6">
                    <button 
                      onClick={() => setCurrentView('home')} 
                      className="flex items-center gap-2 text-sm font-bold text-slate-500 hover:text-slate-800 transition-all bg-white py-2 px-4 rounded-xl border border-slate-200 w-fit"
                    >
                      <IconArrowLeft /> Back to Dashboard
                    </button>

                    <div className={`bg-gradient-to-b ${currentProfile.bgColor} text-white p-8 rounded-3xl text-center shadow-xl relative overflow-hidden`}>
                      <span className="text-xs font-extrabold bg-white/20 px-3 py-1 rounded-full uppercase tracking-widest">Interactive Rep Counter</span>
                      
                      <div className="flex justify-center my-6 select-none">
                        <RenderAnimal id={currentProfile.id} className="w-28 h-28 transform animate-bounce" />
                      </div>

                      <h2 className="text-3xl font-black">{currentProfile.name}</h2>
                      <p className="text-sm text-white/80 mt-1">Ready with <span className="font-bold underline">{currentProfile.petName}</span></p>

                      <div className="my-8 bg-white/10 backdrop-blur-md p-6 rounded-2xl max-w-sm mx-auto border border-white/20">
                        <p className="text-xs font-bold uppercase tracking-wider text-white/70">Your Push Up Target</p>
                        <div className="flex items-baseline justify-center gap-2 mt-2">
                          <span className="text-5xl font-black">{repCounter}</span>
                          <span className="text-xl text-white/60">/ {currentProfile.targetReps} reps</span>
                        </div>
                        
                        {/* Interactive Progress Bar */}
                        <div className="w-full bg-black/20 h-3 rounded-full mt-4 overflow-hidden">
                          <div 
                            className="bg-yellow-300 h-full rounded-full transition-all duration-150" 
                            style={{ width: `${Math.min(100, (repCounter / currentProfile.targetReps) * 100)}%` }}
                          />
                        </div>
                      </div>

                      {currentProfile.completed ? (
                        <div className="bg-emerald-500/30 border-2 border-emerald-400 p-4 rounded-2xl max-w-sm mx-auto">
                          <p className="font-black text-lg">✨ Awesome Job! Completed today!</p>
                        </div>
                      ) : (
                        <div className="space-y-4 max-w-sm mx-auto">
                          {/* BIG INTERACTIVE TAP BUTTON */}
                          <button
                            onClick={incrementRep}
                            className="w-full bg-white text-slate-900 text-xl font-black py-6 px-8 rounded-2xl shadow-xl hover:scale-102 active:scale-95 transition-all flex flex-col items-center justify-center gap-1 cursor-pointer"
                          >
                            <span className="text-2xl">💪 Tap For Each Push Up!</span>
                            <span className="text-xs font-medium text-slate-500">Do your push up then click this!</span>
                          </button>

                          <button 
                            onClick={completeWorkout}
                            className="text-xs text-white/70 hover:text-white underline font-bold"
                          >
                            Or skip directly to finished
                          </button>
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {/* 3. SUB-VIEW: DAILY CHALLENGE (Cooperative goal) */}
                {currentView === 'challenge' && (
                  <div className="fade-in space-y-6">
                    <button 
                      onClick={() => setCurrentView('home')} 
                      className="flex items-center gap-2 text-sm font-bold text-slate-500 hover:text-slate-800 transition-all bg-white py-2 px-4 rounded-xl border border-slate-200 w-fit"
                    >
                      <IconArrowLeft /> Back to Dashboard
                    </button>

                    <div className="bg-white rounded-3xl p-6 border-2 border-slate-100 shadow-sm space-y-6">
                      <div className="flex items-center justify-between pb-4 border-b border-slate-100">
                        <div>
                          <h2 className="text-2xl font-black text-slate-800">Family Push Up Challenge</h2>
                          <p className="text-xs text-slate-500">Every single push up from Bridget, Derek, and Alex counts!</p>
                        </div>
                        <span className="text-4xl">🏆</span>
                      </div>

                      {/* Goal reward cards */}
                      <div className="bg-gradient-to-r from-indigo-50 to-blue-50 border-2 border-indigo-100 rounded-2xl p-5 flex items-start gap-4">
                        <span className="text-4xl">🍨</span>
                        <div>
                          <h3 className="text-md font-bold text-indigo-900">Unlocks at 7-Day Family Streak</h3>
                          <p className="text-xs text-indigo-700 font-medium">"Sunday Ice Cream and Movie Party!" Keep the streak going so the family gets the reward!</p>
                        </div>
                      </div>

                      {/* Cumulative pushup calculation */}
                      <div>
                        <div className="flex justify-between items-baseline mb-2">
                          <span className="text-sm font-extrabold text-slate-600">Today's Team Progress</span>
                          <span className="text-lg font-black text-indigo-600">
                            {profiles.reduce((sum, p) => sum + p.repsDone, 0)} / {profiles.reduce((sum, p) => sum + p.targetReps, 0)} Push Ups Done
                          </span>
                        </div>
                        <div className="w-full bg-slate-100 h-4 rounded-full overflow-hidden border border-slate-200">
                          <div 
                            className="bg-gradient-to-r from-cyan-400 to-indigo-500 h-full rounded-full transition-all duration-300" 
                            style={{ 
                              width: `${(profiles.reduce((sum, p) => sum + p.repsDone, 0) / profiles.reduce((sum, p) => sum + p.targetReps, 0)) * 100}%` 
                            }}
                          />
                        </div>
                      </div>

                      {/* Reset Simulator */}
                      <div className="pt-4 border-t border-slate-100 flex justify-between items-center gap-4">
                        <p className="text-xs text-slate-400 font-medium">Use this helper tool to simulate testing next day's streak loop.</p>
                        <button 
                          onClick={resetDay}
                          className="bg-slate-100 hover:bg-slate-200 text-slate-700 py-2 px-4 rounded-xl text-xs font-bold transition-all"
                        >
                          🌅 Simulate Next Day
                        </button>
                      </div>
                    </div>
                  </div>
                )}

                {/* 4. SUB-VIEW: MESS WITH FAM (Playful Chibi Nudges) */}
                {currentView === 'nudge' && (
                  <div className="fade-in space-y-6">
                    <button 
                      onClick={() => setCurrentView('home')} 
                      className="flex items-center gap-2 text-sm font-bold text-slate-500 hover:text-slate-800 transition-all bg-white py-2 px-4 rounded-xl border border-slate-200 w-fit"
                    >
                      <IconArrowLeft /> Back to Dashboard
                    </button>

                    <div className="bg-white rounded-3xl p-6 border-2 border-slate-100 shadow-sm space-y-6">
                      <div>
                        <h2 className="text-2xl font-black text-slate-800">Mess with Fam!</h2>
                        <p className="text-xs text-slate-500">Pick a family member who hasn't finished and send them a cute chibi alert message!</p>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {profiles.map(p => {
                          const isSelf = p.id === activeProfileId;
                          return (
                            <div 
                              key={p.id}
                              className={`p-4 rounded-2xl border-2 flex items-center justify-between transition-all ${isSelf ? 'border-dashed border-slate-200 bg-slate-50 opacity-60' : 'bg-white border-slate-100'}`}
                            >
                              <div className="flex items-center gap-3">
                                <RenderAnimal id={p.id} className="w-12 h-12" />
                                <div>
                                  <h4 className="font-extrabold text-slate-700">{p.name}</h4>
                                  <p className="text-xs text-slate-500">{p.completed ? "Already finished! 🎉" : "Pending daily push ups"}</p>
                                </div>
                              </div>

                              {!isSelf && (
                                <button
                                  onClick={() => setActiveNudgeUser(p)}
                                  disabled={p.completed}
                                  className={`py-1.5 px-3 rounded-xl font-bold text-xs transition-all ${p.completed ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-amber-400 hover:bg-amber-500 text-slate-900 shadow-sm'}`}
                                >
                                  Nudge Alert
                                </button>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>

                    {/* Interactive Alert Sender Overlay */}
                    {activeNudgeUser && (
                      <div className="bg-white rounded-2xl p-6 shadow-xl border-t-8 border-amber-400 fade-in">
                        <div className="flex items-start justify-between mb-4">
                          <div>
                            <h3 className="text-xl font-bold text-slate-800">Pick an Animal Messenger for {activeNudgeUser.name}</h3>
                            <p className="text-sm text-slate-500">Send custom simulated sound & notification roars!</p>
                          </div>
                          <RenderAnimal id={activeNudgeUser.id} className="w-14 h-14" />
                        </div>
                        
                        <div className="mb-4 space-y-4">
                          <div className="grid grid-cols-1 gap-2 max-h-32 overflow-y-auto pr-1">
                            {CHIBI_NUDGES.map((nudgeMsg, idx) => (
                              <button 
                                key={idx}
                                type="button"
                                onClick={() => setCustomNudgeMessage(nudgeMsg)}
                                className={`text-left text-xs p-2.5 rounded-xl border transition-all ${customNudgeMessage === nudgeMsg ? 'border-amber-400 bg-amber-50 font-bold' : 'border-slate-100 hover:bg-slate-50'}`}
                              >
                                {nudgeMsg}
                              </button>
                            ))}
                          </div>
                        </div>

                        <div className="flex gap-3">
                          <button 
                            onClick={() => { setActiveNudgeUser(null); setCustomNudgeMessage(""); }}
                            className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 py-2.5 rounded-xl font-bold transition-all text-sm"
                          >
                            Cancel
                          </button>
                          <button 
                            onClick={() => triggerNudge(activeNudgeUser, customNudgeMessage)}
                            className="flex-1 bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600 text-white py-2.5 rounded-xl font-bold transition-all text-sm"
                          >
                            Send Nudge Now
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {/* 5. SUB-VIEW: FRIENDS LIST (Streaks Connection Deck) */}
                {currentView === 'friends' && (
                  <div className="fade-in space-y-6">
                    <button 
                      onClick={() => {
                        setCurrentView('home');
                        setFriendSearchQuery("");
                      }} 
                      className="flex items-center gap-2 text-sm font-bold text-slate-500 hover:text-slate-800 transition-all bg-white py-2 px-4 rounded-xl border border-slate-200 w-fit"
                    >
                      <IconArrowLeft /> Back to Dashboard
                    </button>

                    <div className="bg-white rounded-3xl p-6 border-2 border-slate-100 shadow-lg space-y-6">
                      <div className="flex justify-between items-center pb-4 border-b border-slate-100">
                        <div>
                          <h2 className="text-2xl font-black text-slate-800">Teammate & Friends Streaks</h2>
                          <p className="text-xs text-slate-500">Track active daily push up streaks side-by-side!</p>
                        </div>
                        <span className="text-4xl">❤️</span>
                      </div>

                      {/* Top Section: Search Bar & Interactive Search Results */}
                      <div className="space-y-3">
                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider">Find Teammates</label>
                        <div className="relative">
                          <input 
                            type="text" 
                            placeholder="Search for another user..."
                            value={friendSearchQuery}
                            onChange={(e) => setFriendSearchQuery(e.target.value)}
                            className="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl pl-4 pr-10 py-3 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:bg-white text-sm transition-all"
                          />
                          <span className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400">🔍</span>
                        </div>

                        {/* Interactive Search Results */}
                        {friendSearchQuery.trim() !== "" && (
                          <div className="bg-slate-50 border border-slate-200 rounded-2xl p-4 space-y-3 mt-2">
                            <h4 className="text-xs font-bold text-slate-400 uppercase tracking-widest">Search Results</h4>
                            {globalUsersPool.filter(user => 
                              user.name.toLowerCase().includes(friendSearchQuery.toLowerCase())
                            ).length === 0 ? (
                              <p className="text-xs text-slate-500 italic">No users found matching "{friendSearchQuery}". Try searching "Jeffery", "Moci", "Hua Hua" or "Kimbunga"!</p>
                            ) : (
                              <div className="space-y-2">
                                {globalUsersPool
                                  .filter(user => user.name.toLowerCase().includes(friendSearchQuery.toLowerCase()))
                                  .map(user => (
                                    <div key={user.id} className="flex items-center justify-between p-2 bg-white rounded-xl border border-slate-100">
                                      <div className="flex items-center gap-3">
                                        <RenderAnimal id={user.id} className="w-10 h-10" />
                                        <div>
                                          <h5 className="text-xs font-bold text-slate-700">{user.name}</h5>
                                          <p className="text-[10px] text-slate-400">{user.title} • Streak: {user.streak}🔥</p>
                                        </div>
                                      </div>
                                      <button 
                                        onClick={() => addFriend(user)}
                                        className="bg-amber-400 hover:bg-amber-500 active:scale-95 text-slate-900 font-extrabold text-xs py-1.5 px-3 rounded-xl transition-all shadow-sm"
                                      >
                                        + Add Friend
                                      </button>
                                    </div>
                                  ))
                                }
                              </div>
                            )}
                          </div>
                        )}
                      </div>

                      {/* Main Section: Friends List showing visual weekly 7-flame tracks */}
                      <div className="space-y-3">
                        <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest">My Teammates List</h3>
                        <div className="space-y-4 max-h-[380px] overflow-y-auto pr-1">
                          {friendsList.map(p => {
                            const tier = getStreakTier(p.streak);
                            return (
                              <div 
                                key={p.id} 
                                className="p-4 bg-slate-50 border border-slate-100 rounded-3xl flex flex-col sm:flex-row sm:items-center justify-between gap-4 hover:bg-slate-100/30 transition-all shadow-sm"
                              >
                                <div className="flex items-center gap-3.5">
                                  <div className="bg-white p-2 rounded-2xl shadow-xs border border-slate-200/60">
                                    <RenderAnimal id={p.id} className="w-14 h-14" />
                                  </div>
                                  <div>
                                    <div className="flex items-center gap-2">
                                      <h4 className="font-extrabold text-slate-800 text-base leading-none">{p.name}</h4>
                                    </div>
                                    
                                    {/* Progression tier pill */}
                                    <div className="flex items-center gap-2 mt-2">
                                      <span className={`text-[10px] px-2.5 py-0.5 rounded-full font-black uppercase tracking-wider flex items-center gap-1 ${tier.color}`}>
                                        <span>{tier.emoji}</span>
                                        <span>{tier.label} Tier</span>
                                      </span>
                                      <span className="text-xs font-black text-amber-600 flex items-center gap-0.5 bg-amber-100/60 px-2 py-0.5 rounded-md">
                                        🔥 {p.streak} Day Streak
                                      </span>
                                    </div>
                                  </div>
                                </div>

                                <div className="flex flex-col items-start sm:items-end gap-1.5 border-t sm:border-t-0 border-slate-200/50 pt-3 sm:pt-0">
                                  {/* Small status indicator */}
                                  <div className="flex items-center gap-1.5 mb-1">
                                    <span className={`w-2.5 h-2.5 rounded-full ${
                                      p.completed ? 'bg-emerald-500 animate-pulse' : 
                                      p.status === 'Online' ? 'bg-blue-500 animate-pulse' : 'bg-slate-400'
                                    }`}></span>
                                    <span className="text-xs font-bold text-slate-500">
                                      {p.completed ? 'Completed today! 🎉' : p.status}
                                    </span>
                                  </div>

                                  {/* Visual 7-Day Flame Track */}
                                  {renderStreakTrack(p.streak)}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    </div>
                  </div>
                )}

              </main>
            </div>
          );
        }

        // Render the app in the DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
