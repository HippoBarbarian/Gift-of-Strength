<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift of Strength - Family Fitness</title>
    <!-- Tailwind CSS for vibrant, child-friendly styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel CDN to compile JSX in the browser in real-time -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Custom styling to handle smooth scrollbars and clean transitions -->
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        /* Custom scrollbar styling for the simulated logs */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #fef3c7;
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb {
            background: #f59e0b;
            border-radius: 8px;
        }
    </style>
</head>
<body class="bg-amber-50">

    <!-- The DOM element where our React app will mount -->
    <div id="root"></div>

    <!-- Inline SVG helper icons to keep the build entirely dependency-free -->
    <script type="text/babel">
        const IconFlame = () => (
            <svg className="w-5 h-5 inline text-amber-500 fill-amber-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path fillRule="evenodd" d="M12.963 2.285a.75.75 0 0 1 .166.75 8.25 8.25 0 0 0 10.518 9.53a.75.75 0 0 1 .945.945A10.003 10.003 0 0 1 12 21.75c-5.523 0-10-4.477-10-10a9.96 9.96 0 0 1 8.012-9.719.75.75 0 0 1 .951.254l.001.001ZM12 4.5A7.5 7.5 0 0 0 4.5 12a7.5 7.5 0 0 0 7.5 7.5 7.5 7.5 0 0 0 7.5-7.5c0-.462-.042-.914-.122-1.353A10.002 10.002 0 0 1 12 4.5Z" clipRule="evenodd" />
                <path d="M15.75 12c0 .18-.013.357-.037.53a2.25 2.25 0 0 1-2.433 2.433 4.5 4.5 0 0 1-4.526-4.526 2.25 2.25 0 0 1 2.433-2.433c.173-.024.35-.037.53-.037a4.5 4.5 0 0 1 4.033 4.033Z" />
            </svg>
        );

        const IconHeart = () => (
            <svg className="w-6 h-6 fill-rose-500 text-rose-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2.5} stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" />
            </svg>
        );

        const IconBell = () => (
            <svg className="w-5 h-5 text-amber-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
            </svg>
        );

        const IconCheck = () => (
            <svg className="w-4 h-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={3} stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" d="m4.5 12.75 6 6 9-13.5" />
            </svg>
        );

        const IconSend = () => (
            <svg className="w-4 h-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2.5} stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />
            </svg>
        );

        const IconVolume = () => (
            <svg className="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.75 8.25l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.009 9.009 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z" />
            </svg>
        );

        const INITIAL_PROFILES = [
          {
            id: 'derek',
            name: 'Derek (Dad)',
            role: 'Parent',
            avatar: '🐯',
            petName: 'Tango the Tiger',
            bgColor: 'from-orange-400 to-amber-500',
            borderColor: 'border-orange-400',
            exercise: '20 Strong Push Ups',
            completed: false,
            streak: 5,
            lastCompleted: null
          },
          {
            id: 'alex',
            name: 'Alex (Son)',
            role: 'Kid',
            avatar: '🐻',
            petName: 'Barnaby the Bear',
            bgColor: 'from-blue-400 to-cyan-500',
            borderColor: 'border-blue-400',
            exercise: '10 Super-Kid Push Ups',
            completed: false,
            streak: 3,
            lastCompleted: null
          },
          {
            id: 'bridget',
            name: 'Bridget (Mom)',
            role: 'Parent',
            avatar: '🐼',
            petName: 'Penny the Panda',
            bgColor: 'from-purple-400 to-pink-500',
            borderColor: 'border-purple-400',
            exercise: '15 Power Push Ups',
            completed: false,
            streak: 12,
            lastCompleted: null
          }
        ];

        const CHIBI_NUDGES = [
          "🦁 rawrs: Let's do this!",
          "🐼 munches: A little stretch makes a big smile!",
          "🐯 pounces: Don't let our family streak break!",
          "🐻 waves: High five! You can do your push ups!",
          "🐰 hops: Quick, jump in! Our streak is on the line!"
        ];

        function App() {
          const [profiles, setProfiles] = React.useState(() => {
            const saved = localStorage.getItem('gift_of_strength_profiles');
            return saved ? JSON.parse(saved) : INITIAL_PROFILES;
          });
          
          const [activeProfileId, setActiveProfileId] = React.useState('alex');
          const [notifications, setNotifications] = React.useState([
            { id: 1, text: "🐯 Derek completed his daily 20 Strong Push Ups!", time: "1 hour ago", read: false }
          ]);
          const [familyStreak, setFamilyStreak] = React.useState(() => {
            const saved = localStorage.getItem('gift_of_strength_family_streak');
            return saved ? parseInt(saved, 10) : 4;
          });
          const [celebration, setCelebration] = React.useState(null);
          const [activeNudgeUser, setActiveNudgeUser] = React.useState(null);
          const [customNudgeMessage, setCustomNudgeMessage] = React.useState("");
          const [soundEnabled, setSoundEnabled] = React.useState(true);

          // Save to local storage whenever state changes to maintain family data persistence!
          React.useEffect(() => {
            localStorage.setItem('gift_of_strength_profiles', JSON.stringify(profiles));
          }, [profiles]);

          React.useEffect(() => {
            localStorage.setItem('gift_of_strength_family_streak', familyStreak.toString());
          }, [familyStreak]);

          const currentProfile = profiles.find(p => p.id === activeProfileId) || profiles[0];

          const playSound = (type) => {
            if (!soundEnabled) return;
            try {
              const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
              const oscillator = audioCtx.createOscillator();
              const gainNode = audioCtx.createGain();
              
              oscillator.connect(gainNode);
              gainNode.connect(audioCtx.destination);

              if (type === 'complete') {
                oscillator.type = 'triangle';
                oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.15); // E5
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.3);
              } else if (type === 'nudge') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(440, audioCtx.currentTime); // A4
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime + 0.1); // A5
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.2);
              } else if (type === 'switch') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.08);
              }
            } catch (e) {
              console.warn("Audio Context setup delayed.");
            }
          };

          const handleProfileChange = (id) => {
            setActiveProfileId(id);
            playSound('switch');
          };

          const completeWorkout = () => {
            setProfiles(prevProfiles => 
              prevProfiles.map(p => {
                if (p.id === activeProfileId) {
                  if (p.completed) return p;
                  return {
                    ...p,
                    completed: true,
                    streak: p.streak + 1,
                    lastCompleted: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                  };
                }
                return p;
              })
            );

            setCelebration(currentProfile);
            playSound('complete');

            const newNotif = {
              id: Date.now(),
              text: `${currentProfile.avatar} ${currentProfile.name} completed: "${currentProfile.exercise}"!`,
              time: "Just now",
              read: false
            };
            setNotifications(prev => [newNotif, ...prev]);

            setTimeout(() => {
              setProfiles(latestProfiles => {
                const allDone = latestProfiles.every(p => p.completed || p.id === activeProfileId ? true : p.completed);
                if (allDone) {
                  setFamilyStreak(s => s + 1);
                  const streakNotif = {
                    id: Date.now() + 1,
                    text: `🎉 Amazing! Everyone finished today! Family Bond Streak upgraded to ${familyStreak + 1} days! ❤️`,
                    time: "Just now",
                    read: false,
                    special: true
                  };
                  setNotifications(prev => [streakNotif, ...prev]);
                }
                return latestProfiles;
              });
            }, 100);
          };

          const sendNudge = (targetProfile) => {
            const message = customNudgeMessage.trim() || `Remember to do your ${targetProfile.exercise}!`;
            
            const nudgeNotif = {
              id: Date.now(),
              text: `${currentProfile.avatar} ${currentProfile.name} sent a friendly reminder to ${targetProfile.avatar} ${targetProfile.name}: "${message}"`,
              time: "Just now",
              read: false,
              nudge: true
            };

            setNotifications(prev => [nudgeNotif, ...prev]);
            playSound('nudge');
            setActiveNudgeUser(null);
            setCustomNudgeMessage("");
          };

          const resetDay = () => {
            setProfiles(prev => prev.map(p => ({ ...p, completed: false, lastCompleted: null })));
            const systemNotif = {
              id: Date.now(),
              text: "🌅 A new morning has arrived! Workouts have been reset. Keep up the consistency!",
              time: "Just now",
              read: false,
              special: true
            };
            setNotifications(prev => [systemNotif, ...prev]);
          };

          return (
            <div className="min-h-screen bg-amber-50 text-slate-800 font-sans pb-12 transition-all">
              {/* Celebration Pop-up */}
              {celebration && (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                  <div className="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl border-4 border-emerald-400 relative overflow-hidden transform scale-100 transition-transform">
                    <div className="absolute -right-8 -top-8 w-24 h-24 bg-yellow-300 rounded-full opacity-50 blur-xl"></div>
                    <div className="text-7xl mb-4 animate-bounce">{celebration.avatar}</div>
                    <h3 className="text-2xl font-black text-emerald-600 mb-2">UTTERLY AWESOME!</h3>
                    <p className="text-slate-600 font-medium mb-4">
                      {celebration.petName} jumps with joy! You completed <span className="font-bold text-slate-800">{celebration.exercise}</span>.
                    </p>
                    <div className="bg-amber-100 rounded-full px-4 py-2 inline-flex items-center gap-1.5 mb-6 text-amber-700 font-bold">
                      <IconFlame />
                      <span>Your Streak: {celebration.streak + 1} Days!</span>
                    </div>
                    <button 
                      onClick={() => setCelebration(null)}
                      className="w-full bg-emerald-500 hover:bg-emerald-600 active:scale-95 text-white font-bold py-3 px-6 rounded-2xl shadow-lg shadow-emerald-200 transition-all text-lg"
                    >
                      Keep Rocking! 🚀
                    </button>
                  </div>
                </div>
              )}

              {/* Nudge Modal */}
              {activeNudgeUser && (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-40 flex items-center justify-center p-4">
                  <div className="bg-white rounded-2xl p-6 max-w-md w-full shadow-xl border-t-8 border-amber-400">
                    <div className="flex items-start justify-between mb-4">
                      <div>
                        <h3 className="text-xl font-bold text-slate-800">Send an Alert to {activeNudgeUser.name}</h3>
                        <p className="text-sm text-slate-500">Remind them with a fun, child-friendly animal roar!</p>
                      </div>
                      <span className="text-3xl">{activeNudgeUser.avatar}</span>
                    </div>
                    
                    <div className="mb-4">
                      <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Pick a quick message</label>
                      <div className="grid grid-cols-1 gap-2 max-h-32 overflow-y-auto mb-3">
                        {CHIBI_NUDGES.map((nudgeMsg, idx) => (
                          <button 
                            key={idx}
                            type="button"
                            onClick={() => setCustomNudgeMessage(nudgeMsg)}
                            className={`text-left text-sm p-2 rounded-lg border transition-all ${customNudgeMessage === nudgeMsg ? 'border-amber-400 bg-amber-50 font-semibold' : 'border-slate-100 hover:bg-slate-50'}`}
                          >
                            {nudgeMsg}
                          </button>
                        ))}
                      </div>
                      <textarea
                        placeholder="Or write your own loving reminder..."
                        className="w-full p-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-400"
                        rows="2"
                        value={customNudgeMessage}
                        onChange={(e) => setCustomNudgeMessage(e.target.value)}
                      />
                    </div>

                    <div className="flex gap-3">
                      <button 
                        onClick={() => { setActiveNudgeUser(null); setCustomNudgeMessage(""); }}
                        className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 py-2.5 rounded-xl font-bold transition-all text-sm"
                      >
                        Cancel
                      </button>
                      <button 
                        onClick={() => sendNudge(activeNudgeUser)}
                        className="flex-1 bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600 text-white py-2.5 rounded-xl font-bold shadow-md shadow-orange-100 transition-all text-sm flex items-center justify-center gap-1.5"
                      >
                        <IconSend />
                        Send Chibi Alert
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {/* Header Bar */}
              <header className="bg-white border-b-4 border-amber-200 sticky top-0 z-30">
                <div className="max-w-4xl mx-auto px-4 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center gap-3">
                    <div className="bg-amber-400 p-2.5 rounded-2xl shadow-inner text-2xl">🎁</div>
                    <div>
                      <h1 className="text-2xl font-black text-amber-600 tracking-tight leading-none flex items-center gap-1">
                        Gift of Strength
                      </h1>
                      <p className="text-xs text-slate-500 mt-1">Make consistency a playful family game!</p>
                    </div>
                  </div>

                  <div className="flex items-center gap-4">
                    {/* Family shared streak counter */}
                    <div className="bg-rose-50 border-2 border-rose-200 rounded-2xl py-1.5 px-4 flex items-center gap-2 shadow-sm">
                      <IconHeart />
                      <div>
                        <div className="text-xs text-rose-500 font-bold uppercase tracking-wider leading-none">Family Bond</div>
                        <div className="text-lg font-black text-rose-700 leading-none">{familyStreak} Day Streak</div>
                      </div>
                    </div>

                    {/* Sound Toggler */}
                    <button 
                      onClick={() => setSoundEnabled(!soundEnabled)}
                      className={`p-2 rounded-full border transition-all ${soundEnabled ? 'bg-amber-100 border-amber-300 text-amber-700' : 'bg-slate-100 border-slate-200 text-slate-400'}`}
                      title="Toggle Beep Sounds"
                    >
                      <IconVolume />
                    </button>
                  </div>
                </div>
              </header>

              <main className="max-w-4xl mx-auto px-4 mt-6">
                
                {/* Profile Switching Deck */}
                <section className="bg-white rounded-3xl p-6 shadow-sm border-2 border-slate-100 mb-6">
                  <div className="text-center mb-4">
                    <h2 className="text-sm font-bold text-slate-500 uppercase tracking-widest">Who is using the app right now?</h2>
                    <p className="text-xs text-slate-400">Click to switch family views and log exercises!</p>
                  </div>
                  
                  <div className="grid grid-cols-3 gap-3">
                    {profiles.map(p => {
                      const isActive = p.id === activeProfileId;
                      return (
                        <button
                          key={p.id}
                          onClick={() => handleProfileChange(p.id)}
                          className={`flex flex-col items-center p-3 sm:p-4 rounded-2xl border-4 transition-all transform ${isActive ? `${p.borderColor} bg-slate-50 scale-102 shadow-md font-bold` : 'border-transparent hover:bg-slate-50 opacity-70 hover:opacity-100'}`}
                        >
                          <div className="text-4xl sm:text-5xl mb-2 relative">
                            {p.avatar}
                            {p.completed && (
                              <span className="absolute -bottom-1 -right-1 bg-emerald-500 text-white rounded-full p-1 border-2 border-white flex items-center justify-center">
                                <IconCheck />
                              </span>
                            )}
                          </div>
                          <div className="text-xs sm:text-sm font-black text-slate-700">{p.name.split(' ')[0]}</div>
                          <div className="text-[10px] text-slate-500">{p.role}</div>
                        </button>
                      );
                    })}
                  </div>
                </section>

                {/* 2 Column Interaction Grid */}
                <div className="grid grid-cols-1 md:grid-cols-5 gap-6">
                  
                  {/* Column 1: Active User Card (Focuses on the massive action button) */}
                  <div className="md:col-span-3 flex flex-col gap-6">
                    <div className={`bg-gradient-to-b ${currentProfile.bgColor} rounded-3xl p-6 text-white shadow-xl relative overflow-hidden flex-1`}>
                      <div className="absolute -right-10 -bottom-10 w-40 h-40 bg-white/10 rounded-full blur-2xl"></div>
                      <div className="absolute left-6 top-6 text-xs font-black uppercase tracking-widest bg-white/20 py-1 px-3 rounded-full backdrop-blur-sm">
                        Your Dashboard
                      </div>

                      <div className="mt-8 flex flex-col items-center text-center">
                        <div className="w-24 h-24 bg-white/15 rounded-full flex items-center justify-center text-6xl shadow-inner mb-4 relative">
                          {currentProfile.avatar}
                          <span className="absolute -top-1 -right-1 text-2xl animate-pulse">✨</span>
                        </div>

                        <h2 className="text-2xl font-black">{currentProfile.name}</h2>
                        <p className="text-sm text-white/80 mt-1">Guided by: <span className="font-semibold underline decoration-dashed">{currentProfile.petName}</span></p>

                        {/* Individual Streak Badge */}
                        <div className="mt-4 bg-white/20 backdrop-blur-md border border-white/20 py-1.5 px-4 rounded-full flex items-center gap-1.5 text-sm font-bold shadow-sm">
                          <IconFlame />
                          <span>My Active Streak: {currentProfile.streak} Days</span>
                        </div>

                        {/* Today's Mission Plate */}
                        <div className="mt-6 w-full bg-white text-slate-800 rounded-2xl p-5 shadow-lg border-2 border-dashed border-amber-300 relative">
                          <div className="absolute -top-3 left-1/2 transform -translate-x-1/2 bg-amber-400 text-slate-900 font-extrabold text-[10px] uppercase tracking-widest py-0.5 px-3 rounded-full shadow-sm">
                            Today's Task
                          </div>
                          <p className="text-lg font-black text-slate-700 mt-1">"{currentProfile.exercise}"</p>
                          <p className="text-xs text-slate-400 mt-1">Completing this saves the family's daily streak!</p>
                        </div>

                        {/* WORKOUT COMPLETION BUTTON */}
                        <div className="w-full mt-6">
                          {currentProfile.completed ? (
                            <div className="bg-emerald-100 text-emerald-800 rounded-2xl p-4 flex flex-col items-center justify-center border-2 border-emerald-400 shadow-inner">
                              <span className="bg-emerald-500 text-white rounded-full p-2 mb-2">
                                <IconCheck />
                              </span>
                              <span className="font-extrabold text-lg">Workout Finished Today!</span>
                              <span className="text-xs text-emerald-600 mt-0.5">Completed at {currentProfile.lastCompleted}</span>
                            </div>
                          ) : (
                            <button
                              onClick={completeWorkout}
                              className="w-full bg-gradient-to-r from-emerald-400 via-emerald-500 to-teal-500 hover:from-emerald-500 hover:to-teal-600 text-white text-xl font-black py-5 px-8 rounded-2xl shadow-xl shadow-emerald-500/20 active:scale-95 hover:scale-[1.02] transition-all transform flex items-center justify-center gap-3"
                            >
                              <span>✨</span>
                              I Did My Workout!
                            </button>
                          )}
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Column 2: Family Dashboard */}
                  <div className="md:col-span-2 flex flex-col gap-6">
                    <div className="bg-white rounded-3xl p-5 shadow-sm border-2 border-slate-100 flex-1 flex flex-col">
                      <h3 className="text-lg font-black text-slate-700 flex items-center gap-2 mb-4">
                        <IconHeart />
                        Family Progress
                      </h3>

                      <div className="space-y-4 flex-1">
                        {profiles.map(p => {
                          const isSelf = p.id === activeProfileId;
                          return (
                            <div 
                              key={p.id}
                              className={`p-3.5 rounded-2xl border-2 flex items-center justify-between transition-all ${isSelf ? 'bg-amber-50/50 border-amber-200' : 'bg-slate-50 border-slate-100'}`}
                            >
                              <div className="flex items-center gap-3">
                                <div className="text-3xl bg-white p-2 rounded-xl shadow-sm border border-slate-100">
                                  {p.avatar}
                                </div>
                                <div>
                                  <div className="flex items-center gap-1">
                                    <span className="font-bold text-sm text-slate-700">{p.name.split(' ')[0]}</span>
                                    {isSelf && <span className="text-[9px] bg-amber-400 text-slate-800 font-bold px-1.5 py-0.5 rounded-md uppercase">Me</span>}
                                  </div>
                                  <div className="text-[10px] text-slate-500 truncate max-w-[120px]">{p.exercise}</div>
                                  <div className="flex items-center gap-1 mt-0.5 text-amber-600 font-bold text-xs">
                                    <IconFlame />
                                    <span>{p.streak} days</span>
                                  </div>
                                </div>
                              </div>

                              <div>
                                {p.completed ? (
                                  <div className="flex items-center gap-1 text-emerald-600 text-xs font-black bg-emerald-50 py-1.5 px-3 rounded-full border border-emerald-100">
                                    <span>Done</span>
                                  </div>
                                ) : (
                                  <div>
                                    {isSelf ? (
                                      <div className="text-[11px] font-bold text-rose-500 bg-rose-50 py-1 px-2.5 rounded-full border border-rose-100 animate-pulse">
                                        Do it!
                                      </div>
                                    ) : (
                                      <button
                                        onClick={() => setActiveNudgeUser(p)}
                                        className="bg-amber-400 hover:bg-amber-500 active:scale-95 text-slate-900 font-extrabold text-[11px] py-1.5 px-3 rounded-xl transition-all shadow-sm flex items-center gap-1"
                                      >
                                        <IconBell />
                                        Alert
                                      </button>
                                    )}
                                  </div>
                                )}
                              </div>
                            </div>
                          );
                        })}
                      </div>

                      {/* Action summary description */}
                      <div className="mt-4 bg-amber-50 rounded-2xl p-3 border border-amber-100">
                        <p className="text-xs text-slate-600 leading-relaxed font-medium">
                          💡 <span className="font-bold text-amber-700">Family Mode:</span> Save this browser tab! It automatically saves your active streak and stats directly to your device browser so they persist!
                        </p>
                        <button 
                          onClick={resetDay}
                          className="mt-3 w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-1.5 px-3 rounded-xl text-xs transition-all"
                        >
                          🌅 Sim Next Day (Reset Progress)
                        </button>
                      </div>
                    </div>
                  </div>
                </div>

                {/* Notifications Log */}
                <section className="bg-white rounded-3xl p-6 shadow-sm border-2 border-slate-100 mt-6">
                  <div className="flex items-center justify-between mb-4 pb-2 border-b border-slate-100">
                    <h3 className="text-md font-bold text-slate-700 flex items-center gap-2">
                      <IconBell />
                      Live Phone Alerts Log (Simulated Notifications)
                    </h3>
                    <button 
                      onClick={() => setNotifications([])}
                      className="text-xs text-slate-400 hover:text-slate-600 font-bold transition-all"
                    >
                      Clear Log
                    </button>
                  </div>

                  {notifications.length === 0 ? (
                    <div className="text-center py-6 text-slate-400 text-sm">
                      No recent alerts.
                    </div>
                  ) : (
                    <div className="space-y-3 max-h-56 overflow-y-auto pr-1">
                      {notifications.map(n => {
                        let cardStyle = "bg-slate-50 border-slate-100 text-slate-700";
                        if (n.special) cardStyle = "bg-rose-50 border-rose-200 text-rose-800 font-bold";
                        if (n.nudge) cardStyle = "bg-orange-50 border-orange-200 text-orange-800 font-medium";

                        return (
                          <div 
                            key={n.id}
                            className={`p-3 rounded-xl border-2 text-xs flex items-start justify-between gap-3 ${cardStyle}`}
                          >
                            <div className="flex items-start gap-2">
                              <div className="mt-0.5">
                                {n.special ? '🏆' : n.nudge ? '📢' : '💪'}
                              </div>
                              <p>{n.text}</p>
                            </div>
                            <span className="text-[10px] text-slate-400 whitespace-nowrap">{n.time}</span>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </section>

              </main>
            </div>
          );
        }

        // Render the app in the DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
